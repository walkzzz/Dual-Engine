name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Build and test on multiple platforms
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check code formatting
        run: cargo fmt --all -- --check
        if: matrix.os == 'ubuntu-latest'

      - name: Run Clippy linter
        run: cargo clippy --workspace --all-targets -- -D warnings
        if: matrix.os == 'ubuntu-latest'

      - name: Build workspace
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --workspace --release --target ${{ matrix.target }} -- --nocapture

      - name: Build Go binary (OpenCode)
        if: matrix.os == 'ubuntu-latest'
        working-directory: src/opencode
        run: |
          go version
          go build -o ../../bin/opencode .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dual-engine-${{ matrix.os }}
          path: |
            target/${{ matrix.target }}/release/de.exe
            target/${{ matrix.target }}/release/det.exe
          if-no-files-found: warn

  # Security audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit --deny warnings

  # Documentation check
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Check documentation
        run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

  # Release on tag
  release:
    name: Release
    needs: [build-test, security-audit, docs]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Build release binaries
        run: cargo build --workspace --release

      - name: Create release archive
        run: |
          mkdir -p release
          cp target/release/de release/
          cp target/release/det release/
          cp bin/opencode release/ 2>/dev/null || true
          cp bin/claude release/ 2>/dev/null || true
          cp README.md LICENSE release/
          cd release && zip -r ../dual-engine-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dual-engine-${{ github.ref_name }}.zip
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
